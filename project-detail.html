<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- THAY ĐỔI TIÊU ĐỀ TRANG TƯƠNG ỨNG VỚI DỰ ÁN -->
    <title>Chimp tee - Portfolio</title>
    
    <!-- Font hiện đại phù hợp với phong cách Game Developer -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --header-bg: #161b22;
            --text-color: #e6edf3;
            --text-light: #8b949e;
            --accent-glow: #00f0ff;
            --accent-purple: #b026ff;
            --border-color: #30363d;
        }

        /* Hiệu ứng mượt mà khi load trang */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            animation: fadeIn 0.8s ease-out forwards;
        }
        
        /* Header Styling (Giống trang chủ) */
        header {
            position: relative;
            background-color: var(--header-bg);
            text-align: center;
            padding: 50px 20px 30px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .logo img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            margin-bottom: 25px;
            border-radius: 50%;
            border: 2px solid var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: all 0.3s;
        }
        .logo img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.8);
        }
        nav {
            margin-bottom: 15px;
        }
        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 24px;
            font-weight: 500;
            margin: 0 15px;
            transition: all 0.3s;
            position: relative;
        }
        nav a:hover, nav a.active {
            color: var(--accent-glow);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        }
        nav a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-glow);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        
        /* Header Right (Contact & Menu) */
        .header-right {
            position: absolute;
            right: 30px;
            top: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .contact-btn {
            display: inline-block;
            padding: 10px 20px;
            background: transparent;
            color: var(--text-color);
            text-decoration: none;
            border: 2px solid var(--text-light);
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            transition: all 0.3s;
        }
        .contact-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }
        .menu-btn:hover {
            color: var(--accent-glow);
        }
        
        /* Project Detail Styling */
        main.project-detail {
            max-width: 900px;
            margin: 70px auto;
            padding: 0 20px;
            text-align: center;
        }
        .project-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .project-description {
            font-size: 18px;
            color: var(--text-light);
            line-height: 1.8;
            max-width: 650px;
            margin: 0 auto 50px auto;
            background: var(--header-bg);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .project-images img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s;
        }
        .project-images img:hover {
            transform: scale(1.02);
            border-color: var(--accent-purple);
            box-shadow: 0 10px 30px rgba(176, 38, 255, 0.2);
        }
        
        /* Footer Styling (Giống trang chủ) */
        footer {
            background-color: var(--header-bg);
            text-align: center;
            padding: 50px 20px;
            border-top: 1px solid var(--border-color);
            margin-top: 80px;
        }
        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        .social-links a {
            color: var(--text-light);
            font-size: 28px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .social-links a:hover {
            color: var(--accent-glow);
            transform: scale(1.2);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }
        .cv-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: transparent;
            color: var(--accent-glow);
            text-decoration: none;
            border: 1px solid var(--accent-glow);
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }
        .cv-btn:hover {
            background-color: var(--accent-glow);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav a {
                font-size: 20px;
                margin: 0 10px;
            }
            .header-right {
                position: static;
                justify-content: center;
                margin-top: 20px;
            }
            .project-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="logo">
            <!-- Nhấn vào logo để về lại trang chủ -->
            <a href="index.html">
                <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="Logo">
            </a>
        </div>
        <nav>
            <a href="index.html" class="active">Portfolio</a>
            <a href="about.html">About</a>
        </nav>
        <div class="header-right">
            <a href="#footer-section" class="contact-btn">CONTACT</a>
            <button class="menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <!-- Project Detail Section -->
    <main class="project-detail">
        <!-- THAY ĐỔI TÊN DỰ ÁN Ở ĐÂY -->
        <h1 class="project-title">Chimp tee</h1>
        
        <!-- THAY ĐỔI MÔ TẢ DỰ ÁN Ở ĐÂY -->
        <p class="project-description">
            I was asked by mailchimp a couple of years ago to make tee for their company. I believe the design was not used but nonetheless it was an extremely fun design to make and an exelent client. Very happy for the opportunity.
        </p>

        <!-- KHU VỰC HÌNH ẢNH CHI TIẾT -->
        <div class="project-images">
            <!-- Thay đổi đường dẫn ảnh trong src="..." thành ảnh dự án của bạn -->
            <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1000&auto=format&fit=crop" alt="Chimp tee design">
            
            <!-- Bạn có thể copy dòng img này để thêm hình cho dự án -->
            <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?q=80&w=1000&auto=format&fit=crop" alt="Chimp tee shirt mockup">
        </div>
    </main>

    <!-- Footer Section -->
    <footer>
        <div class="footer-content">
            <div class="social-links">
                <!-- THAY ĐỔI LINK GMAIL: Sửa email của bạn -->
                <a href="mailto:your-email@gmail.com" target="_blank" title="Email"><i class="fas fa-envelope"></i></a>
                <a href="https://github.com/DinhTanThanh" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/in/your-username" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://your-username.itch.io" target="_blank" title="itch.io"><i class="fab fa-itch-io"></i></a>
            </div>
            <a href="cv.pdf" class="cv-btn" target="_blank">
                <i class="fas fa-download" style="margin-right: 8px;"></i> Download CV
            </a>
        </div>
    </footer>

</body>
</html>
